<body class="font-body-md text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopNavBar (Linear/Transactional page, but requested in prompt, so including it as an anchor, but usually wouldn't for a pure form) -->
<!-- Assuming this form is part of a larger portal where they navigate to 'Registration' -->
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop py-xl">
<!-- Registration Card -->
<div class="bg-surface border-4 border-on-surface neo-shadow-lg w-full max-w-2xl p-md md:p-lg">
<header class="border-b-4 border-on-surface pb-sm mb-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-base">Semester Registration</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Complete the form below to secure your classes for the upcoming term.</p>
</header>
<form class="space-y-md">
<!-- Full Name Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide" for="fullName">Full Name</label>
<input class="neo-input bg-surface border-2 border-on-surface p-sm font-body-md text-body-md text-on-surface transition-shadow duration-100 focus:bg-primary-container" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide" for="email">Email Address</label>
<input class="neo-input bg-surface border-2 border-on-surface p-sm font-body-md text-body-md text-on-surface transition-shadow duration-100 focus:bg-primary-container" id="email" name="email" placeholder="jane.doe@university.edu" required="" type="email"/>
</div>
<!-- Phone Number Field -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide" for="phone">Phone Number</label>
<input class="neo-input bg-surface border-2 border-on-surface p-sm font-body-md text-body-md text-on-surface transition-shadow duration-100 focus:bg-primary-container" id="phone" name="phone" placeholder="(555) 123-4567" type="tel"/>
</div>
<!-- Semester Dropdown -->
<div class="flex flex-col gap-base pt-sm">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide" for="semester">Semester Selection</label>
<div class="relative">
<select class="neo-input appearance-none bg-surface border-2 border-on-surface p-sm w-full font-body-md text-body-md text-on-surface transition-shadow duration-100 focus:bg-primary-container cursor-pointer" id="semester" name="semester" required="">
<option disabled="" selected="" value="">Select a semester...</option>
<option value="fall24">Fall 2024</option>
<option value="spring25">Spring 2025</option>
<option value="summer25">Summer 2025</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-sm text-on-surface">
<span class="material-symbols-outlined font-bold">expand_more</span>
</div>
</div>
</div><div class="flex flex-col gap-base pt-sm">
<label class="font-label-bold text-label-bold text-on-surface uppercase tracking-wide">Course Selection</label>
<div class="grid grid-cols-1 gap-xs">
<div class="flex items-center gap-sm border-2 border-on-surface p-sm bg-surface">

<input class="w-6 h-6 border-2 border-on-surface appearance-none checked:bg-secondary-container checked:border-on-surface focus:ring-0 focus:outline-none cursor-pointer relative before:content-[''] before:absolute before:inset-0 before:bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjQiIHN0cm9rZS1saW5lY2FwPSJzcXVhcmUiIHN0cm9rZS1saW5lam9pbj0ibWl0ZXIiPjxwb2x5bGluZSBwb2ludHM9IjIwIDYgOSAxNyA0IDEyIj48L3BvbHlsaW5lPjwvc3ZnPg==')] before:bg-no-repeat before:bg-center before:bg-[length:14px] before:hidden checked:before:block" id="course-math" name="courses" type="checkbox" value="math"/>
<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none flex-grow" for="course-math">Advanced Mathematics</label>

<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none flex-grow" for="course-econ">Principles of Economics</label>
</div>
<div class="flex items-center gap-sm border-2 border-on-surface p-sm bg-surface">
<input class="w-6 h-6 border-2 border-on-surface appearance-none checked:bg-secondary-container checked:border-on-surface focus:ring-0 focus:outline-none cursor-pointer relative before:content-[''] before:absolute before:inset-0 before:bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjQiIHN0cm9rZS1saW5lY2FwPSJzcXVhcmUiIHN0cm9rZS1saW5lam9pbj0ibWl0ZXIiPjxwb2x5bGluZSBwb2ludHM9IjIwIDYgOSAxNyA0IDEyIj48L3BvbHlsaW5lPjwvc3ZnPg==')] before:bg-no-repeat before:bg-center before:bg-[length:14px] before:hidden checked:before:block" id="course-history" name="courses" type="checkbox" value="history"/>
<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none flex-grow" for="course-history">World History</label>
</div>
<div class="flex items-center gap-sm border-2 border-on-surface p-sm bg-surface">
<input class="w-6 h-6 border-2 border-on-surface appearance-none checked:bg-secondary-container checked:border-on-surface focus:ring-0 focus:outline-none cursor-pointer relative before:content-[''] before:absolute before:inset-0 before:bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjQiIHN0cm9rZS1saW5lY2FwPSJzcXVhcmUiIHN0cm9rZS1saW5lam9pbj0ibWl0ZXIiPjxwb2x5bGluZSBwb2ludHM9IjIwIDYgOSAxNyA0IDEyIj48L3BvbHlsaW5lPjwvc3ZnPg==')] before:bg-no-repeat before:bg-center before:bg-[length:14px] before:hidden checked:before:block" id="course-design" name="courses" type="checkbox" value="design"/>
<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none flex-grow" for="course-design">Graphic Design 101</label>
</div>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-sm pb-md">
<div class="flex items-center h-5 mt-1">
<input class="w-6 h-6 border-2 border-on-surface appearance-none checked:bg-on-surface checked:border-on-surface focus:ring-0 focus:outline-none cursor-pointer relative before:content-[''] before:absolute before:inset-0 before:bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjQiIHN0cm9rZS1saW5lY2FwPSJzcXVhcmUiIHN0cm9rZS1saW5lam9pbj0ibWl0ZXIiPjxwb2x5bGluZSBwb2ludHM9IjIwIDYgOSAxNyA0IDEyIj48L3BvbHlsaW5lPjwvc3ZnPg==')] before:bg-no-repeat before:bg-center before:bg-[length:14px] before:hidden checked:before:block" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none" for="terms">
                        I agree to the academic terms and confirm my course selections.
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-secondary-container border-4 border-on-surface neo-shadow-md py-4 font-headline-md text-headline-md text-on-surface hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_#000000] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all duration-100 ease-linear flex justify-center items-center gap-xs" type="submit">
                        Submit Registration
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<script>
        // Simple script to handle form submission for visual feedback
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Processing... <span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 1;">refresh</span>';
            btn.classList.add('bg-primary-container', 'translate-x-[4px]', 'translate-y-[4px]');
            btn.classList.remove('neo-shadow-md', 'hover:translate-x-[2px]', 'hover:translate-y-[2px]', 'hover:shadow-[2px_2px_0px_0px_#000000]');
            btn.style.boxShadow = 'none';

            setTimeout(() => {
                btn.innerHTML = 'Registered! <span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-secondary-fixed');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-secondary-fixed', 'translate-x-[4px]', 'translate-y-[4px]');
                    btn.classList.add('bg-secondary-container', 'neo-shadow-md', 'hover:translate-x-[2px]', 'hover:translate-y-[2px]', 'hover:shadow-[2px_2px_0px_0px_#000000]');
                    this.reset();
                }, 2000);
            }, 1500);
        });
    </script>
